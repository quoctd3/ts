<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTC Vault Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap');
        :root { --bg: #050505; --card: rgba(15, 15, 15, 0.8); --accent: #f97316; --emerald: #10b981; --rose: #f43f5e; }
        body { background-color: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; background-image: radial-gradient(circle at 50% 0%, rgba(249, 115, 22, 0.08) 0%, transparent 50%); overflow-x: hidden; }
        .glass { background: var(--card); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neo-button:active { transform: scale(0.96); }
        .price-up { color: var(--emerald); }
        .price-down { color: var(--rose); }
        .font-mono-custom { font-family: 'JetBrains Mono', monospace; }
        input { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); outline: none; text-align: center; color: white; }
        input:focus { border-color: var(--accent); }
        .modal-blur { backdrop-filter: blur(15px); background: rgba(0, 0, 0, 0.85); }
    </style>
</head>
<body class="p-3 min-h-screen flex flex-col items-center">
    <div class="w-full max-w-sm space-y-4">
        <header class="flex justify-between items-center px-1">
            <div class="space-y-0.5">
                <div class="flex items-center gap-1.5">
                    <div class="h-1.5 w-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                    <span id="btc-price" class="font-mono-custom text-base font-bold text-zinc-400">$--,---</span>
                </div>
                <p id="break-even" class="text-[9px] font-bold uppercase tracking-wider text-blue-500/80">HÒA VỐN: $--,--</p>
            </div>
            <button onclick="toggleModal(true)" class="neo-button glass px-3 py-1.5 rounded-xl text-[9px] font-black text-orange-500 border-zinc-800 uppercase tracking-tighter">DỮ LIỆU</button>
        </header>

        <main class="glass rounded-[2rem] p-8 relative overflow-hidden flex flex-col items-center text-center shadow-2xl">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-orange-500/10 blur-[50px]"></div>
            <div class="relative z-10 space-y-1 mb-6">
                <p class="text-[9px] font-black uppercase tracking-[0.3em] text-zinc-500 italic mb-2">Tổng Tài Sản</p>
                <h1 id="current-value" class="text-4xl font-extrabold tracking-tighter text-white font-mono-custom leading-none">$0.00</h1>
                <p id="current-value-vnd" class="text-sm font-bold text-zinc-400 mt-2">≈ 0 VNĐ</p>
            </div>
            <div class="grid grid-cols-3 gap-1 w-full pt-6 border-t border-zinc-800/30 z-10">
                <div><p class="text-[7px] font-bold text-zinc-600 uppercase mb-0.5">Vốn Nạp</p><p id="stat-invested" class="text-[10px] font-bold text-zinc-200 font-mono-custom">$0</p></div>
                <div class="border-x border-zinc-800/30"><p class="text-[7px] font-bold text-orange-500 uppercase mb-0.5">Số dư BTC</p><p id="stat-btc" class="text-[10px] font-bold text-white font-mono-custom">0.0000</p></div>
                <div><p class="text-[7px] font-bold text-zinc-600 uppercase mb-0.5">Lời/Lỗ</p><p id="profit-display" class="text-[10px] font-bold font-mono-custom">+0.00%</p></div>
            </div>
        </main>

        <section class="glass rounded-2xl p-4">
            <div class="flex flex-col gap-3">
                <input type="text" id="quick-entry" class="w-full p-4 rounded-xl text-base font-bold font-mono-custom" placeholder="Số tiền [dấu cách] Số BTC">
                <button onclick="addEntry()" class="neo-button w-full bg-orange-600 text-white font-black py-4 rounded-xl text-[10px] uppercase tracking-[0.2em]">XÁC NHẬN LỆNH</button>
            </div>
        </section>

        <section class="space-y-3 pb-8">
            <div class="flex justify-between items-end px-1">
                <h3 class="text-[9px] font-black uppercase tracking-widest text-zinc-600 italic">Nhật ký tích sản</h3>
                <span id="log-count" class="text-[8px] font-bold text-zinc-800 uppercase">0 LỆNH</span>
            </div>
            <div id="log-list" class="space-y-2 max-h-[350px] overflow-y-auto pr-1"></div>
        </section>
    </div>

    <div id="backup-modal" class="modal-blur fixed inset-0 z-50 hidden items-center justify-center p-6">
        <div class="glass w-full max-w-[280px] rounded-[2.5rem] p-7 space-y-4 text-center border-zinc-800 shadow-3xl">
            <h3 class="text-xs font-black italic uppercase tracking-widest text-orange-500 mb-2">QUẢN LÝ DỮ LIỆU</h3>
            <div class="space-y-2.5">
                <button onclick="copyToClipboard()" class="neo-button w-full bg-white text-black py-3.5 rounded-xl text-[9px] font-black uppercase">Sao chép Mã Gốc</button>
                <button onclick="exportData()" class="neo-button w-full bg-zinc-900 border border-zinc-800 py-3.5 rounded-xl text-[9px] font-black uppercase text-zinc-400">Xuất File .JSON</button>
            </div>
            <button onclick="toggleModal(false)" class="text-[9px] font-black text-zinc-600 uppercase tracking-[0.3em] pt-4">ĐÓNG</button>
        </div>
    </div>
    <div id="toast" class="fixed bottom-12 bg-white text-black text-[10px] font-black px-6 py-3 rounded-full shadow-2xl transition-all opacity-0 translate-y-4 pointer-events-none z-[60] uppercase">THÔNG BÁO</div>

    <script>
        const USD_VND_RATE = 25450;
        
        // DỮ LIỆU CHUẨN: VỐN GỐC $5.480 CÓ 0.0654 BTC
        const INITIAL_DATA = [
            {"amount": 5480, "btc": 0.0654, "date": "TRƯỚC ĐÂY"}
        ];
        
        let logs = JSON.parse(localStorage.getItem('btc_dca_logs')) || INITIAL_DATA;
        let currentPrice = 0; let lastPrice = 0;

        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
        ws.onmessage = (e) => { 
            const data = JSON.parse(e.data); 
            currentPrice = parseFloat(data.c); 
            updateUI(); 
        };

        function toggleModal(show) { 
            const m = document.getElementById('backup-modal'); 
            m.classList.toggle('hidden', !show); 
            m.classList.toggle('flex', show); 
        }

        function showToast(m) { 
            const t = document.getElementById('toast'); 
            t.innerText = m; t.style.opacity = '1'; 
            t.style.transform = 'translateY(0)'; 
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(1rem)'; }, 2500); 
        }

        function copyToClipboard() { 
            navigator.clipboard.writeText(JSON.stringify(logs)).then(() => showToast('ĐÃ COPY MÃ DỮ LIỆU')); 
        }

        function addEntry() {
            const input = document.getElementById('quick-entry');
            const parts = input.value.trim().split(/[\s,]+/);
            if (parts.length < 2) return showToast('NHẬP SAI ĐỊNH DẠNG');
            const amount = parseFloat(parts[0]); 
            const btc = parseFloat(parts[1]);
            if (isNaN(amount) || isNaN(btc)) return showToast('DỮ LIỆU LỖI');
            const now = new Date(); 
            const dateStr = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear().toString().slice(-2)}`;
            logs.push({ amount, btc, date: dateStr });
            localStorage.setItem('btc_dca_logs', JSON.stringify(logs));
            updateUI(); 
            input.value = ''; 
            showToast('ĐÃ THÊM LỆNH');
        }

        function deleteEntry(index) { 
            if (index === 0) return showToast('KHÔNG THỂ XÓA GỐC');
            if (confirm("Xóa lệnh này?")) { 
                logs.splice(index, 1); 
                localStorage.setItem('btc_dca_logs', JSON.stringify(logs)); 
                updateUI(); 
            } 
        }

        function exportData() { 
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(logs)); 
            const a = document.createElement('a'); a.href = dataStr; a.download = `btc_backup.json`; a.click(); 
        }

        function updateUI() {
            const priceEl = document.getElementById('btc-price');
            if (currentPrice > 0) { 
                priceEl.innerText = '$' + currentPrice.toLocaleString(undefined, { maximumFractionDigits: 0 }); 
                priceEl.className = `font-mono-custom text-base font-bold ${currentPrice > lastPrice ? 'price-up' : 'price-down'}`; 
                lastPrice = currentPrice; 
            }
            
            const totalInv = logs.reduce((s, l) => s + l.amount, 0); 
            const totalBTC = logs.reduce((s, l) => s + l.btc, 0);
            const curVal = totalBTC * currentPrice; 
            const profit = curVal - totalInv; 
            const be = totalInv / totalBTC;
            
            document.getElementById('current-value').innerText = '$' + curVal.toLocaleString(undefined, {maximumFractionDigits: 2});
            document.getElementById('current-value-vnd').innerText = '≈ ' + Math.round(curVal * USD_VND_RATE).toLocaleString() + ' VNĐ';
            document.getElementById('stat-invested').innerText = '$' + Math.round(totalInv).toLocaleString();
            document.getElementById('stat-btc').innerText = totalBTC.toFixed(6);
            document.getElementById('break-even').innerText = 'HÒA VỐN: $' + Math.round(be).toLocaleString();
            document.getElementById('log-count').innerText = `${logs.length} LỆNH`;
            
            const pEl = document.getElementById('profit-display'); 
            pEl.innerText = (profit >= 0 ? '+' : '') + ((profit/totalInv)*100).toFixed(2) + '%'; 
            pEl.style.color = profit >= 0 ? 'var(--emerald)' : 'var(--rose)';
            
            let html = ''; 
            logs.slice().reverse().forEach((log, i) => {
                const realIdx = logs.length - 1 - i; 
                const isBase = realIdx === 0;
                html += `
                <div class="glass p-4 rounded-2xl flex justify-between items-center relative overflow-hidden">
                    ${isBase ? '<div class="absolute left-0 top-0 bottom-0 w-1 bg-orange-600"></div>' : ''}
                    <div>
                        <p class="text-[8px] font-black text-zinc-600 uppercase">${log.date}</p>
                        <p class="text-sm font-bold font-mono-custom">$${log.amount.toLocaleString()}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-right">
                            <p class="text-xs font-bold font-mono-custom ${isBase ? 'text-orange-500' : 'text-zinc-400'}">+${log.btc}</p>
                        </div>
                        ${!isBase ? `<button onclick="deleteEntry(${realIdx})" class="text-zinc-700 hover:text-rose-500">×</button>` : '<div class="w-4 text-[10px] text-zinc-800">★</div>'}
                    </div>
                </div>`;
            });
            document.getElementById('log-list').innerHTML = html;
        }
        updateUI();
    </script>
</body>
</html>
